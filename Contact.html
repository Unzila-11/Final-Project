<style>
    body {
        background-color: rgb(139, 5, 122);
        height: 98vh;
        width: 98vw;
    }
     .Top {
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo img {
            height: 60px;
            width: 50px;
            border-radius: 50%;
            padding: 2px;
            border: 2px solid #e487ec;
        }

        nav ul {
            display: flex;
            gap: 25px;
        }

        nav ul li {
            list-style: none;
            padding: 10px;
        }

        nav ul li a {
            color: antiquewhite;
            text-decoration: solid;
            font-size: 14px;
            position: relative;
            transition: 0.3s;
        }

        nav ul li a::after {
            content: "";
            position: absolute;
            width: 0;
            height: 2px;
            background: #e487ec;
            left: 0;
            bottom: -5px;
            transition: 0.3s;
        }
nav ul li a:hover{color: white;}
        nav ul li a:hover::after {
            width: 100%;
            
        }

        .Icons {
            margin-left: 15px;
            cursor: pointer;
            transition: 0.3s;
        }



        .Icons a {
            text-decoration: none;
            color: antiquewhite;
        }

        .Icons a i {
            font-size: 20px;
            padding: 5px;
        }

        .Icons i:hover {
            color: #e487ec;
        }
    .Heading h1 {
        padding: 30px;
        text-align: center;
        font-size: 60px;
    }

   .Card-container {
    display: flex;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
}

    .flip-card {
        width: 280px;
        height: 280px;
        border: 13px solid #080000;
        perspective: 800px;
        border-radius: 30px;
        
    }

    .flip-card-inner {
        position: relative;
        width: 100%;
        height: 100%;
        text-align: center;
        transition: transform 0.8s;
        transform-style: preserve-3d;
        
    }

    .flip-card:hover .flip-card-inner {
        transform: rotateY(180deg);
    }

    .flip-card-front,
    .flip-card-back {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
    }

    .flip-card-front {
        background-color: #080000;
        color: black;
    }

    .flip-card-back {
        background-color: #d65b94;
        color: white;
        transform: rotateY(180deg);

    }

    a {
        text-decoration: none;
        color: antiquewhite;
    }

    a:hover {
        color: black;
    }

  img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
</style>
